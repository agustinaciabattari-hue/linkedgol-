[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --no-frozen-lockfile --prod=false && pnpm --filter @workspace/linkedgol build"

[deploy]
startCommand = "pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
